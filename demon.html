<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #00c6ff, #0072ff, #6a11cb);
}

form{
    width: 100%;
    display: flex;
    justify-content: center;
}

nav{
    width: 420px;
    padding: 40px 35px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: white;
}

.head{
    text-align: center;
    margin-bottom: 30px;
}

.head h1{
    font-size: 38px;
    margin-bottom: 10px;
}

.head h3{
    font-size: 16px;
    font-weight: 300;
    opacity: 0.9;
}

.input{
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.input label{
    font-size: 14px;
    font-weight: 500;
}

.input input[type="email"],
.input input[type="password"]{
    padding: 14px 16px;
    border: none;
    outline: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 15px;
}

.input input::placeholder{
    color: rgba(255,255,255,0.75);
}

.checkbox{
    margin-top: 12px;
    display: flex;
}

#checkbox{
    margin-top: 12px;
}

.checkbox label{
    margin-top: 12px;
    margin-left: 10px;
}

.checkbox a{
    margin-top: 12px;
    margin-left: 95px;
    color: white;
}

.input a{
    color: #fff;
    margin-top: 5px;
    font-size: 14px;
}


.button{
    margin-top: 28px;
}

.button button{
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: white;
    color: #0072ff;
    font-size: 18px;
    font-weight: 600;
    transition: 0.3s;
}

.button button:hover{
    transform: scale(1.1);
}

.login-options{
    margin-top: 28px;
    text-align: center;
}

.login-options label{
    display: block;
    margin-bottom: 16px;
    font-size: 15px;
}

.login-options img{
    margin: 0 10px;
    padding: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: 0.3s;
}

.login-options img:hover{
    transform: scale(1.20);
    background: rgba(255,255,255,0.35);
}
    </style>
</head>
<body>
    
    <form action="">
        <nav>
            <div class="head">
                <h1>Welcome Back</h1>
                <h3>Please Enter Your details</h3>
            </div>

            <div class="input">
                <label for="">Email: </label>
                <input type="email" placeholder="Enter email">
                <label for="">Password: </label>
                <input type="password" placeholder="Enter password">
            </div>

            <div class="checkbox">
                <input type="checkbox" id="checkbox">
                <label for="checkbox">Remember me</label>
                <a href="#">Forgot Password</a>
            </div>

            <div class="button">
                <button>Sign in</button>
            </div>

            <div class="login-options">
                <label>Or</label>
                <img src="google.png" width="40px">
                <img src="facebook.png" width="40px">
                <img src="apple.png" width="40px">
            </div>
        </nav>
    </form>
</body>
</html>
